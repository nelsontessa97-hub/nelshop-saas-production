<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>NELSHOP SAAS 🚀</title>

<style>
body { font-family: Arial; margin:0; background:#f4f4f4; }
header { background:black; color:white; padding:15px; text-align:center; }

.container { display:flex; }

.products {
  flex:3;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
  padding:10px;
}

.card { background:white; padding:10px; border-radius:10px; }

.card img {
  width:100%;
  height:150px;
  object-fit:cover;
}

.cart {
  flex:1;
  background:white;
  padding:10px;
  height:100vh;
  border-left:1px solid #ddd;
}

button {
  width:100%;
  padding:8px;
  background:black;
  color:white;
  border:none;
  margin-top:5px;
}

.auth, .seller {
  padding:10px;
  background:white;
  margin:10px;
}
</style>

</head>

<body>

<header>NELSHOP SAAS 🚀</header>

<!-- AUTH -->
<div class="auth">
  <h3>Register</h3>
  <input id="name" placeholder="Name"><br>
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="register()">Créer compte</button>

  <h3>Login</h3>
  <input id="emailLogin" placeholder="Email"><br>
  <input id="passwordLogin" type="password" placeholder="Password"><br>
  <button onclick="login()">Connexion</button>
</div>

<!-- SELLER -->
<div class="seller">
  <h3>Ajouter produit</h3>
  <input id="pname" placeholder="Nom"><br>
  <input id="pprice" placeholder="Prix"><br>
  <input id="pimage" placeholder="Image URL"><br>
  <button onclick="addProduct()">Ajouter produit</button>
</div>

<!-- ADMIN -->
<div class="seller">
  <h3>Admin Dashboard 💰</h3>
  <button onclick="loadOrders()">Voir commandes</button>
  <div id="orders"></div>
</div>

<div class="container">

  <div class="products" id="products"></div>

  <div class="cart">
    <h3>Panier</h3>
    <div id="cart"></div>
    <h4>Total: <span id="total">0</span></h4>
    <button onclick="pay()">Payer 💳</button>
  </div>

</div>

<script>

const API = "http://localhost:5000/api";
let cart = [];

// ======================
// AUTH
// ======================
async function register(){
  await fetch(API + "/register", {
    method:"POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      name: name.value,
      email: email.value,
      password: password.value
    })
  });

  alert("Compte créé");
}

async function login(){
  const res = await fetch(API + "/login", {
    method:"POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: emailLogin.value,
      password: passwordLogin.value
    })
  });

  const data = await res.json();

  if(data.token){
    localStorage.setItem("token", data.token);
    alert("Connecté 🚀");
  } else {
    alert("Erreur login");
  }
}

// ======================
// ADD PRODUCT
// ======================
async function addProduct(){
  const token = localStorage.getItem("token");

  if(!token) return alert("Connecte-toi d'abord");

  await fetch(API + "/products", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + token
    },
    body: JSON.stringify({
      name: pname.value,
      price: Number(pprice.value),
      image: pimage.value
    })
  });

  alert("Produit ajouté");
  loadProducts();
}

// ======================
// PRODUCTS
// ======================
async function loadProducts(){
  const res = await fetch(API + "/products");
  const data = await res.json();

  const box = document.getElementById("products");
  box.innerHTML = "";

  data.forEach(p => {
    box.innerHTML += `
      <div class="card">
        <img src="${p.image || 'https://via.placeholder.com/150'}">
        <h3>${p.name}</h3>
        <p>${p.price}$</p>
        <button onclick='add(${JSON.stringify(p)})'>Ajouter</button>
      </div>
    `;
  });
}

// ======================
// CART
// ======================
function add(p){
  cart.push(p);
  render();
}

function render(){
  let total = 0;
  let box = document.getElementById("cart");
  box.innerHTML = "";

  cart.forEach(i => {
    total += i.price;
    box.innerHTML += `<div>${i.name} - ${i.price}$</div>`;
  });

  document.getElementById("total").innerText = total;
}

// ======================
// PAYMENT
// ======================
async function pay(){
  const res = await fetch(API + "/pay", {
    method:"POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ items: cart })
  });

  const data = await res.json();
  if(data.url) window.location.href = data.url;
}

// ======================
// ADMIN DASHBOARD
// ======================
async function loadOrders(){
  const res = await fetch(API + "/admin/orders");
  const data = await res.json();

  let box = document.getElementById("orders");
  box.innerHTML = "";

  let totalCommission = 0;

  data.forEach(o => {
    totalCommission += o.commission;

    box.innerHTML += `
      <div>
        Total: ${o.total}$ |
        Commission: ${o.commission}$
      </div>
    `;
  });

  box.innerHTML += `<h3>💰 Gains plateforme: ${totalCommission}$</h3>`;
}

loadProducts();

</script>

</body>
</html>
